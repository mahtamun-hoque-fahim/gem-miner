<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gem Miner</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
<div class="app">

  <!-- ── Header ─────────────────────────────── -->
  <header class="header">
    <div class="logo">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M12 3L4.5 8.5L12 14L19.5 8.5L12 3Z" fill="#3DF49A"/>
        <path d="M4.5 8.5L12 14L19.5 8.5" stroke="#1a7a4a" stroke-width="1.5" stroke-linejoin="round"/>
        <path d="M7 11L12 21L17 11" fill="#1a7a4a"/>
        <path d="M7 11L12 21L17 11" stroke="#3DF49A" stroke-width="1" stroke-linejoin="round"/>
      </svg>
      <span class="logo-text">Gem Miner</span>
    </div>
    <span class="badge">v1.0</span>
  </header>

  <!-- ── Not-on-Gemini state ────────────────── -->
  <div id="state-not-gemini" class="state hidden">
    <svg width="30" height="30" viewBox="0 0 24 24" fill="none">
      <circle cx="12" cy="12" r="9" stroke="#555" stroke-width="1.5"/>
      <path d="M12 8v5" stroke="#555" stroke-width="1.5" stroke-linecap="round"/>
      <circle cx="12" cy="16" r="0.75" fill="#555"/>
    </svg>
    <p>Open <strong>gemini.google.com</strong>, start a conversation, then click Export.</p>
  </div>

  <!-- ── Scanning state ─────────────────────── -->
  <div id="state-scanning" class="state hidden">
    <div class="spinner"></div>
    <p>Scanning conversation&hellip;</p>
  </div>

  <!-- ── No messages found ──────────────────── -->
  <div id="state-empty" class="state hidden">
    <svg width="30" height="30" viewBox="0 0 24 24" fill="none">
      <path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z" stroke="#555" stroke-width="1.5" stroke-linejoin="round"/>
    </svg>
    <p>No messages found. Send a message to Gemini first.</p>
  </div>

  <!-- ── Main export panel ──────────────────── -->
  <div id="panel-export" class="hidden">

    <!-- Summary card -->
    <div class="card summary-card">
      <div class="summary-row">
        <span class="label">Messages</span>
        <span class="value" id="msg-count">—</span>
      </div>
      <div class="summary-row">
        <span class="label">Conversation</span>
        <span class="value truncate" id="chat-title">—</span>
      </div>
    </div>

    <!-- Options -->
    <div class="options">
      <div class="field">
        <label class="field-label" for="input-title">PDF title</label>
        <input id="input-title" class="input" type="text" placeholder="Gemini Chat Export" maxlength="120">
      </div>

      <div class="field">
        <label class="field-label">Color theme</label>
        <div class="theme-row">
          <button class="theme-btn active" data-theme="light">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none">
              <circle cx="12" cy="12" r="4" stroke="currentColor" stroke-width="2"/>
              <path d="M12 2v2M12 20v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M2 12h2M20 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"
                    stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            </svg>
            Light
          </button>
          <button class="theme-btn" data-theme="dark">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none">
              <path d="M21 12.79A9 9 0 1111.21 3a7 7 0 109.79 9.79z"
                    stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            Dark
          </button>
        </div>
      </div>

      <div class="field checkbox-field">
        <label class="checkbox-label">
          <input id="chk-meta" type="checkbox" checked>
          Include export metadata (date, URL)
        </label>
      </div>

      <div class="field checkbox-field">
        <label class="checkbox-label">
          <input id="chk-autoprint" type="checkbox" checked>
          Open print dialog automatically
        </label>
      </div>
    </div>

    <!-- Export button -->
    <button id="btn-export" class="btn-export" disabled>
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none">
        <path d="M12 3v13M12 16l-5-5M12 16l5-5" stroke="currentColor" stroke-width="2.2"
              stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M3 19h18" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"/>
      </svg>
      Export as PDF
    </button>

    <!-- Status line -->
    <div id="status" class="status"></div>
  </div>

</div>
<script src="popup.js"></script>
</body>
</html>
